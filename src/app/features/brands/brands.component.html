<app-navbar></app-navbar>
<main class="min-h-screen bg-red-300">
  <aside class="bg-linear-to-br from-red-400 via-red-500 to-red-600 text-white">
    <section class="container mx-auto px-4 py-10 sm:py-14">
      <div class="flex items-center gap-2 text-xl text-white mb-6 flex-wrap">
        <a href="/" class="text-red-300 hover:text-red-200 transition-colors duration-200">
          Home
        </a>
        <span class="text-red-100">/</span>
        <span class="font-medium">Brands</span>
      </div>
      <div class="flex items-center gap-5">
        <div
          class="size-16 rounded-2xl bg-white text-red-500 backdrop-blur-sm flex justify-center items-center shadow-xl ring-8 ring-red-300 text-4xl outline-4 outline-offset-12 outline-red-200"
        >
          <i class="fa-solid fa-tags"></i>
        </div>
        <div class="text-white">
          <h2 class="text-5xl font-bold tracking-tight">Top Brands</h2>
          <p class="text-red-300 mt-1 text-xl">Shop from your favorite brands</p>
        </div>
      </div>
    </section>
  </aside>
  <aside class="container mx-auto">
    @if (isAnimation) {
      <div class="relative min-h-[500px]">
        <i
          class="fa-solid fa-spinner fa-spin absolute top-1/2 start-1/2 -traslate-x-1/2 
          -translate-y-1/2 text-5xl text-red-500"
        ></i>
      </div>
    }
    <div class="px-4 py-8">
      <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
        @for (item of brands(); track item._id) {
          <div
            [routerLink]="['/brands', item._id]"
            class="group bg-white rounded-2xl border-2 border-red-500 p-4 sm:p-6 shadow-md 
            cursor-pointer shadow-red-500 hover:shadow-xl hover:border-red-700 transition-all 
            duration-300 hover:-translate-y-1"
          >
            <div class="bg-red-300 aspect-square rounded-xl overflow-hidden mb-3 p-4 flex items-center
            justify-center">
              <img
                [src]="item.image"
                [alt]="item.name"
                class="size-full object-contain group-hover:scale-110 transition-transform duration-500"
              />
            </div>
            <h3
              class="font-bold text-red-500 text-center text-2xl group-hover:text-red-700 
              transition-colors"
            >
              {{ item.name }}
            </h3>
            <div
              class="flex justify-center items-center mt-2 opacity-0 group-hover:opacity-100 
              transition-opacity"
            >
              <span
                [routerLink]="['/brands', item._id]"
                class="text-xl text-blue-500 flex items-center gap-1"
              >
                View Products <i class="fa-solid fa-arrow-right"></i>
              </span>
            </div>
          </div>
        }@empty{
                <div class="col-span-5 text-center py-20">
                    <div class="size-20 rounded-full bg-red-500 text-white flex items-center 
                    justify-center mx-auto mb-5">
                       <i class="fa-solid fa-box-open text-4xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-red-500 mb-2">
                        No Brands Found
                    </h3>
                    <p class="text-black mb-6 text-xl">
                        No brands match your current filters.
                    </p>
                    <a routerLink="/shop/products" class="inline-flex gap-2 items-center px-6 py-3
                    rounded-xl bg-red-500 text-white font-semibold hover:bg-red-700
                     transition-colors
                    text-2xl">View All Products</a>
                </div>
        }
      </div>
    </div>
  </aside>
</main>
<app-newsletter></app-newsletter>
<app-footer></app-footer>
