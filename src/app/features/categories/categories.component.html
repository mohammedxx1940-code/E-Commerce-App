<app-navbar></app-navbar>
<main class="min-h-screen bg-red-300">
    <aside class="bg-linear-to-br from-red-400 via-red-500 to-red-600 text-white">
        <section class="container mx-auto px-4 py-10 sm:py-14">
            <div class="flex items-center gap-2 text-base text-white mb-6 flex-wrap">
                <a href="/" class="text-red-300 hover:text-red-200 transition-colors duration-200">
                    Home
                </a>
                <span class="text-red-100">/</span>
                <span class="font-medium">Categories</span>
            </div>
            <div class="flex items-center gap-5">
                <div class="size-16 rounded-2xl bg-white text-red-500 backdrop-blur-sm flex
                justify-center items-center shadow-xl ring-8 ring-red-300 text-2xl
                outline-4 outline-offset-10 outline-red-200">
                   <i class="fa-solid fa-layer-group"></i>
                </div>
                <div class="text-white">
                    <h2 class="text-3xl font-bold tracking-tight">All Categories</h2>
                    <p class="text-red-300 mt-1 text-base">Browse our wide range of product categories</p>
                </div>
            </div>
        </section>
    </aside>
    <aside class="container mx-auto">
        @if (isAnimation) {
            <div class="relative min-h-[500px]">
               <i class="fa-solid fa-spinner fa-spin absolute top-1/2 start-1/2 -traslate-x-1/2 
                -translate-y-1/2 text-3xl text-red-500"></i>
            </div>
        }
        <div class="px-4 py-8">
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6">
                @for (item of categories(); track item._id) { 
                   <app-all-categories-card [category]="item"></app-all-categories-card>
                }
            </div>
        </div>
    </aside> 
</main>
<app-newsletter></app-newsletter>
<app-footer></app-footer>
