<app-navbar></app-navbar>
<main class="min-h-screen bg-red-300">
    <aside class="bg-linear-to-br from-red-400 via-red-500 to-red-600 text-white">
        <section class="container mx-auto px-4 py-10 sm:py-14">
            <div class="flex items-center gap-2 text-xl text-white mb-6 flex-wrap">
                <a href="/" class="text-red-300 hover:text-red-200 transition-colors duration-200">
                    Home
                </a>
                <span class="text-red-100">/</span>
                <span class="font-medium">All Products</span>
            </div>
            <div class="flex items-center gap-5">
                <div class="size-16 rounded-2xl bg-white text-red-500 backdrop-blur-sm flex
                justify-center items-center shadow-xl ring-8 ring-red-300 text-4xl
                outline-4 outline-offset-12 outline-red-200">
                   <i class="fa-solid fa-box-open"></i>
                </div>
                <div class="text-white">
                    <h2 class="text-5xl font-bold tracking-tight">All Products</h2>
                    <p class="text-red-300 mt-1 text-xl">Explore our complete product collection</p>
                </div>
            </div>
        </section>
    </aside>
    <aside class="container mx-auto">
        @if (isAnimation) {
            <div class="relative min-h-[500px]">
               <i class="fa-solid fa-spinner fa-spin absolute top-1/2 start-1/2 -traslate-x-1/2 
                -translate-y-1/2 text-5xl text-red-500"></i>
            </div>
        }
        <div class="px-4 py-8 ">
            <h3 class="mb-6 text-4xl text-red-500 font-bold">Showing {{products().length}} products</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                @for (item of products(); track item.id) {
                   <app-product-card [product]="item"></app-product-card>
                }
            </div>
        </div>
    </aside> 
</main>
<app-newsletter></app-newsletter>
<app-footer></app-footer>
