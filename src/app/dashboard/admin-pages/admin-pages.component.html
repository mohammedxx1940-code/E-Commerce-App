<main class="min-h-screen">
   <aside class="bg-linear-to-br from-red-400 via-red-500 to-red-600 text-white">
        <header class="container mx-auto px-4 py-10 sm:py-14">
            <div class="flex items-center gap-2 text-xl text-white mb-6 flex-wrap">
                <a routerLink="products-admin" 
                class="text-red-300 hover:text-red-200 transition-colors duration-200"
                routerLinkActive="!text-red-200">
                    Products
                </a>
                <span class="text-red-100">/</span>
                <a routerLink="orders-admin" 
                class="text-red-300 hover:text-red-200 transition-colors duration-200"
                routerLinkActive="!text-red-200">
                    Orders
                </a>
                <span class="text-red-100">/</span>
                <a routerLink="users-admin" 
                class="text-red-300 hover:text-red-200 transition-colors duration-200"
                routerLinkActive="!text-red-200">
                    Users
                </a>
                <span class="text-red-100">/</span>
                <a (click)="logout()" 
                class="text-red-300 hover:text-red-200 transition-colors duration-200 cursor-pointer">
                    Logout
                </a>
            </div>
            <p class="text-xl text-red-50 uppercase">my admin</p>
            <p class="text-xl text-red-50 lowercase">products , Orders , users</p>
        </header>
    </aside>
    <article class="container mx-auto py-8 px-4">
        <section>
            <router-outlet></router-outlet>
        </section>
    </article>
</main>
